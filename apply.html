<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신청 - 매매 시스템</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <header class="site">
    <h1>신청</h1>
    <nav class="site">
      <a href="index.html">소개</a>
      <a href="check.html">내 정보 조회</a>
    </nav>
  </header>

  <div class="card">
    <h2>사용 신청</h2>
    <form id="applyForm">
      <label for="name">이름</label>
      <input type="text" id="name" required>

      <label for="email">이메일</label>
      <input type="email" id="email" required>

      <label for="product">제품</label>
      <select id="product">
        <option value="nt8">NinjaTrader 8 버전</option>
        <option value="mt5">MetaTrader 5 버전</option>
      </select>

      <label for="months">신청 기간</label>
      <select id="months">
        <option value="1">1개월</option>
        <option value="3">3개월</option>
        <option value="6">6개월</option>
        <option value="12">12개월</option>
      </select>

      <button type="submit" id="submitBtn">신청하기</button>
    </form>

    <div id="result" class="result-box"></div>

    <div class="deposit-info">
      <strong>입금 계좌 안내</strong><br>
      카카오뱅크 3333-24-9824590 (예금주: 민찬홍)<br>
      신청 접수 후 위 계좌로 입금해주시면, 확인 후 이메일로 라이선스 키를 보내드립니다.
    </div>
  </div>

  <footer class="site">문의: minssajang@gmail.com</footer>
</div>

<script src="js/supabase-config.js"></script>
<script>
document.getElementById("applyForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const submitBtn = document.getElementById("submitBtn");
  const result = document.getElementById("result");
  submitBtn.disabled = true;
  submitBtn.textContent = "신청 중...";
  result.className = "result-box";

  try {
    await callRpc("apply_license", {
      p_name: document.getElementById("name").value.trim(),
      p_email: document.getElementById("email").value.trim(),
      p_product: document.getElementById("product").value,
      p_months: parseInt(document.getElementById("months").value, 10),
    });
    result.textContent = "신청이 접수되었습니다. 위 계좌로 입금해주시면 확인 후 이메일로 라이선스 키를 보내드립니다.";
    result.className = "result-box show ok";
    document.getElementById("applyForm").reset();
  } catch (err) {
    result.textContent = "신청 중 오류가 발생했습니다: " + err.message;
    result.className = "result-box show err";
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "신청하기";
  }
});
</script>
</body>
</html>
